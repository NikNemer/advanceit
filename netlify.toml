[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent site from being embedded in iframes (clickjacking)
    X-Frame-Options = "SAMEORIGIN"

    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Control referrer info sent to external sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable browser features not used by this site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Content Security Policy
    Content-Security-Policy = "default-src 'none'; script-src 'self' https://identity.netlify.com https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data:; frame-src https://www.google.com; connect-src 'self' https://*.netlify.com https://identity.netlify.com https://cdn.jsdelivr.net; form-action 'self' https://*.netlify.com; base-uri 'self'; object-src 'none';"
